<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dark Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #0b0f19;
            background-image: 
                radial-gradient(at 0% 0%, rgba(31, 41, 55, 0.5) 0, transparent 50%),
                radial-gradient(at 100% 100%, rgba(17, 24, 39, 0.9) 0, transparent 50%);
            padding: 20px;
        }

        .calculator-container {
            width: 100%;
            max-width: 360px;
            background: #111827;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .screen {
            width: 100%;
            height: 120px;
            background: #030712;
            border-radius: 20px;
            margin-bottom: 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.02);
            overflow: hidden;
        }

        .history {
            font-size: 0.95rem;
            color: #6b7280;
            margin-bottom: 6px;
            min-height: 20px;
        }

        .display {
            font-size: 2.25rem;
            color: #f9fafb;
            font-weight: 500;
        }

        .display.heart-active {
            animation: pulseGlow 1s ease-in-out infinite alternate;
            color: #fda4af;
        }

        @keyframes pulseGlow {
            0% { transform: scale(1); text-shadow: 0 0 10px rgba(244, 63, 94, 0.4); }
            100% { transform: scale(1.02); text-shadow: 0 0 20px rgba(244, 63, 94, 0.8); }
        }

        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;
        }

        button {
            border: none;
            outline: none;
            height: 64px;
            border-radius: 18px;
            font-size: 1.35rem;
            font-weight: 500;
            background: #1f2937;
            color: #e5e7eb;
            touch-action: manipulation; 
        }

        button:active {
            transform: scale(0.92);
            background: #4b5563 !important;
            color: #ffffff !important;
        }

        button.operator {
            background: rgba(244, 63, 94, 0.1);
            color: #fb7185;
        }

        button.clear {
            background: #374151;
            color: #9ca3af;
        }

        button.equals {
            grid-column: span 2;
            background: #f43f5e;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(244, 63, 94, 0.3);
        }

        @media (max-width: 350px) {
            .calculator-container { padding: 16px; }
            .buttons-grid { gap: 10px; }
            button { height: 58px; font-size: 1.2rem; border-radius: 14px; }
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <div class="screen">
            <div class="history" id="history"></div>
            <div class="display" id="display">0</div>
        </div>
        <div class="buttons-grid">
            <button class="clear" data-action="clear">C</button>
            <button data-val="(">(</button>
            <button data-val=")">)</button>
            <button class="operator" data-val="/">/</button>
            
            <button data-val="7">7</button>
            <button data-val="8">8</button>
            <button data-val="9">9</button>
            <button class="operator" data-val="*">&times;</button>
            
            <button data-val="4">4</button>
            <button data-val="5">5</button>
            <button data-val="6">6</button>
            <button class="operator" data-val="-">&minus;</button>
            
            <button data-val="1">1</button>
            <button data-val="2">2</button>
            <button data-val="3">3</button>
            <button class="operator" data-val="+">+</button>
            
            <button data-val="0">0</button>
            <button data-val=".">.</button>
            <button class="equals" data-action="calculate">=</button>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const display = document.getElementById('display');
            const history = document.getElementById('history');
            let shouldReset = false;

            function appendValue(val) {
                if (display.classList.contains('heart-active') || shouldReset || display.innerText === 'Error') {
                    clearScreen();
                }
                if (display.innerText === '0' && !isNaN(val)) {
                    display.innerText = val;
                } else {
                    display.innerText += val;
                }
            }

            function clearScreen() {
                display.innerText = '0';
                history.innerText = '';
                display.classList.remove('heart-active');
                shouldReset = false;
            }

            function calculate() {
                let expression = display.innerText;
                
                if (/\/0(?:\.0*)?(?!\d)/.test(expression)) {
                    history.innerText = expression + ' =';
                    display.innerText = 'Undefined ❤️';
                    display.classList.add('heart-active');
                    shouldReset = true;
                    return;
                }

                try {
                    let result = Function('"use strict";return (' + expression + ')')();
                    if (result === Infinity || result === -Infinity || isNaN(result)) {
                        display.innerText = 'Undefined ❤️';
                        display.classList.add('heart-active');
                        shouldReset = true;
                    } else {
                        history.innerText = expression + ' =';
                        display.innerText = Number(result.toFixed(8)).toString();
                        shouldReset = true;
                    }
                } catch (error) {
                    display.innerText = 'Error';
                    shouldReset = true;
                }
            }

            // Universal Event Delegation for Touch & Click handling
            const grid = document.querySelector('.buttons-grid');
            const handleInteraction = (e) => {
                const button = e.target.closest('button');
                if (!button) return;
                
                e.preventDefault(); // Prevents ghost clicks/double triggers on hybrid mobile viewports

                const val = button.getAttribute('data-val');
                const action = button.getAttribute('data-action');

                if (val !== null) appendValue(val);
                if (action === 'clear') clearScreen();
                if (action === 'calculate') calculate();
            };

            grid.addEventListener('touchstart', handleInteraction, { passive: false });
            grid.addEventListener('click', handleInteraction);
        });
    </script>
</body>
</html>
